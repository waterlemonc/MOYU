<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>麻将消消乐</title>
    <style>
      :root {
        --bg: #efe5d1;
        --bg-deep: #d9c4a0;
        --panel: rgba(255, 251, 243, 0.82);
        --line: rgba(64, 50, 31, 0.12);
        --ink: #24303b;
        --muted: #697482;
        --accent: #bf4d30;
        --accent-soft: #f4d3a0;
        --good: #3f8a5d;
        --shadow: 0 26px 60px rgba(69, 53, 34, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(191, 77, 48, 0.16), transparent 24%),
          radial-gradient(circle at right bottom, rgba(63, 138, 93, 0.14), transparent 18%),
          linear-gradient(180deg, #f9f2e5 0%, var(--bg) 54%, var(--bg-deep) 100%);
      }

      .shell {
        width: min(1200px, calc(100% - 24px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }

      .hero,
      .panel {
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--panel);
        backdrop-filter: blur(12px);
        box-shadow: var(--shadow);
      }

      .hero {
        padding: 24px;
        margin-bottom: 18px;
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--accent);
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      .intro {
        margin-top: 14px;
        max-width: 60ch;
        line-height: 1.8;
        color: var(--muted);
      }

      .layout {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        gap: 18px;
      }

      .sidebar,
      .board-wrap {
        padding: 22px;
      }

      .stats {
        display: grid;
        gap: 12px;
      }

      .stat {
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.68);
        border: 1px solid rgba(64, 50, 31, 0.08);
      }

      .stat span {
        display: block;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .stat strong {
        display: block;
        margin-top: 8px;
        font-size: 1.25rem;
      }

      .actions {
        display: grid;
        gap: 10px;
        margin-top: 16px;
      }

      button,
      .back {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 12px 16px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        text-align: center;
        transition: transform 160ms ease, box-shadow 160ms ease;
      }

      button:hover,
      .back:hover {
        transform: translateY(-2px);
      }

      .primary {
        color: #fffaf4;
        background: linear-gradient(135deg, var(--accent), #df8251);
        box-shadow: 0 14px 24px rgba(191, 77, 48, 0.24);
      }

      .secondary,
      .back {
        color: var(--ink);
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(64, 50, 31, 0.08);
      }

      .tips {
        margin-top: 18px;
        padding: 16px;
        border-radius: 18px;
        background: rgba(244, 211, 160, 0.38);
        color: #5b4d3d;
        line-height: 1.75;
      }

      .tips strong {
        display: block;
        margin-bottom: 8px;
      }

      .board-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      .status {
        color: var(--muted);
        font-size: 0.96rem;
      }

      .board {
        display: grid;
        grid-template-columns: repeat(12, minmax(52px, 1fr));
        gap: 10px;
      }

      .tile {
        position: relative;
        aspect-ratio: 0.78;
        border-radius: 18px;
        border: 1px solid rgba(64, 50, 31, 0.12);
        background: linear-gradient(180deg, #fffef8 0%, #f5ecde 100%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.9),
          0 10px 16px rgba(73, 57, 38, 0.08);
        cursor: pointer;
        transition: transform 140ms ease, box-shadow 140ms ease, opacity 160ms ease;
      }

      .tile:hover {
        transform: translateY(-3px);
      }

      .tile.locked {
        opacity: 0.44;
        filter: saturate(0.7);
        cursor: not-allowed;
      }

      .tile.selected {
        transform: translateY(-4px) scale(1.03);
        box-shadow:
          inset 0 0 0 2px rgba(191, 77, 48, 0.24),
          0 16px 26px rgba(191, 77, 48, 0.18);
      }

      .tile.hint {
        animation: pulse 1s ease-in-out 0s 2;
      }

      .tile.removed {
        opacity: 0;
        transform: scale(0.86);
        pointer-events: none;
      }

      .tile-inner {
        position: absolute;
        inset: 8px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        text-align: center;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(250, 243, 229, 0.82));
      }

      .tile-glyph {
        font-size: 1.6rem;
        line-height: 1;
      }

      .tile-name {
        margin-top: 6px;
        font-size: 0.82rem;
        color: var(--muted);
      }

      .theme-bamboo .tile-glyph {
        color: #2f8a4f;
      }

      .theme-coin .tile-glyph {
        color: #c55d26;
      }

      .theme-wind .tile-glyph {
        color: #47679b;
      }

      .theme-dragon .tile-glyph {
        color: #9d3657;
      }

      .win {
        color: var(--good);
        font-weight: 700;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-4px) scale(1.03);
          box-shadow:
            inset 0 0 0 2px rgba(63, 138, 93, 0.28),
            0 16px 24px rgba(63, 138, 93, 0.18);
        }
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .board {
          grid-template-columns: repeat(6, minmax(46px, 1fr));
        }
      }

      @media (max-width: 640px) {
        .shell {
          width: min(100% - 16px, 1200px);
          padding: 16px 0 28px;
        }

        .hero,
        .panel {
          border-radius: 22px;
        }

        .hero,
        .sidebar,
        .board-wrap {
          padding: 18px;
        }

        .board {
          grid-template-columns: repeat(4, minmax(44px, 1fr));
          gap: 8px;
        }

        .tile-glyph {
          font-size: 1.35rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">MOYU MAHJONG</p>
        <h1>麻将消消乐</h1>
        <p class="intro">
          规则很简单：只能点击左右至少有一边空着的麻将牌。选中两张同样的牌，就能把它们一起消掉。
        </p>
      </section>

      <section class="layout">
        <aside class="panel sidebar">
          <div class="stats">
            <div class="stat">
              <span>剩余牌数</span>
              <strong id="remaining-count">0</strong>
            </div>
            <div class="stat">
              <span>已消对子</span>
              <strong id="match-count">0</strong>
            </div>
            <div class="stat">
              <span>当前状态</span>
              <strong id="status-text">准备开局</strong>
            </div>
          </div>

          <div class="actions">
            <button class="primary" id="restart-button" type="button">重新开局</button>
            <button class="secondary" id="shuffle-button" type="button">重新洗牌</button>
            <button class="secondary" id="hint-button" type="button">给我提示</button>
            <a class="back" href="../index.html">返回摸鱼指挥部</a>
          </div>

          <div class="tips">
            <strong>摸鱼提示</strong>
            牌被视作“可点”时，左右至少一侧必须没有相邻牌。洗牌会保留当前已消进度，只重新摆放剩余牌。
          </div>
        </aside>

        <section class="panel board-wrap">
          <div class="board-head">
            <h2>牌桌</h2>
            <span class="status" id="board-status">看看哪两张先有缘分。</span>
          </div>

          <div class="board" id="board"></div>
        </section>
      </section>
    </main>

    <script>
      const boardEl = document.getElementById("board");
      const remainingCountEl = document.getElementById("remaining-count");
      const matchCountEl = document.getElementById("match-count");
      const statusTextEl = document.getElementById("status-text");
      const boardStatusEl = document.getElementById("board-status");
      const restartButton = document.getElementById("restart-button");
      const shuffleButton = document.getElementById("shuffle-button");
      const hintButton = document.getElementById("hint-button");

      const tileDefs = [
        { key: "bamboo-1", glyph: "竹", name: "青竹", theme: "bamboo" },
        { key: "bamboo-2", glyph: "兰", name: "幽兰", theme: "bamboo" },
        { key: "bamboo-3", glyph: "菊", name: "秋菊", theme: "bamboo" },
        { key: "bamboo-4", glyph: "梅", name: "寒梅", theme: "bamboo" },
        { key: "coin-1", glyph: "一", name: "一筒", theme: "coin" },
        { key: "coin-2", glyph: "二", name: "二筒", theme: "coin" },
        { key: "coin-3", glyph: "三", name: "三筒", theme: "coin" },
        { key: "coin-4", glyph: "四", name: "四筒", theme: "coin" },
        { key: "wind-1", glyph: "东", name: "东风", theme: "wind" },
        { key: "wind-2", glyph: "南", name: "南风", theme: "wind" },
        { key: "dragon-1", glyph: "中", name: "红中", theme: "dragon" },
        { key: "dragon-2", glyph: "发", name: "发财", theme: "dragon" },
      ];

      const slotCount = 48;
      const baseDeck = tileDefs.flatMap((tile) => [
        { ...tile, id: `${tile.key}-a` },
        { ...tile, id: `${tile.key}-b` },
        { ...tile, id: `${tile.key}-c` },
        { ...tile, id: `${tile.key}-d` },
      ]);

      let state = {
        tiles: [],
        selectedId: null,
        matchCount: 0,
        locked: false,
      };

      function shuffle(list) {
        const arr = [...list];
        for (let index = arr.length - 1; index > 0; index -= 1) {
          const swapIndex = Math.floor(Math.random() * (index + 1));
          [arr[index], arr[swapIndex]] = [arr[swapIndex], arr[index]];
        }
        return arr;
      }

      function getRemainingTiles() {
        return state.tiles.filter((tile) => !tile.removed);
      }

      function getTileById(id) {
        return state.tiles.find((tile) => tile.id === id);
      }

      function isTileFree(tile) {
        if (!tile || tile.removed) {
          return false;
        }

        const leftBlocked = state.tiles.some(
          (other) => !other.removed && other.slot === tile.slot - 1
        );
        const rightBlocked = state.tiles.some(
          (other) => !other.removed && other.slot === tile.slot + 1
        );

        return !leftBlocked || !rightBlocked;
      }

      function getFreeMatchingPairs() {
        const freeTiles = state.tiles.filter((tile) => isTileFree(tile));
        const pairs = [];

        for (let index = 0; index < freeTiles.length; index += 1) {
          for (let inner = index + 1; inner < freeTiles.length; inner += 1) {
            if (freeTiles[index].key === freeTiles[inner].key) {
              pairs.push([freeTiles[index], freeTiles[inner]]);
            }
          }
        }

        return pairs;
      }

      function updateStatus(text, win = false) {
        statusTextEl.textContent = text;
        boardStatusEl.textContent = text;
        statusTextEl.classList.toggle("win", win);
      }

      function renderBoard() {
        boardEl.innerHTML = "";
        const tilesBySlot = new Map(state.tiles.map((tile) => [tile.slot, tile]));

        for (let slot = 0; slot < slotCount; slot += 1) {
          const tile = tilesBySlot.get(slot);

          if (!tile || tile.removed) {
            const spacer = document.createElement("div");
            spacer.setAttribute("aria-hidden", "true");
            boardEl.appendChild(spacer);
            continue;
          }

          const button = document.createElement("button");
          const free = isTileFree(tile);
          button.type = "button";
          button.className = `tile theme-${tile.theme}`;
          if (!free) {
            button.classList.add("locked");
          }
          if (state.selectedId === tile.id) {
            button.classList.add("selected");
          }
          if (tile.removing) {
            button.classList.add("removed");
          }
          if (tile.hint) {
            button.classList.add("hint");
          }
          button.dataset.tileId = tile.id;
          button.ariaLabel = `${tile.name}${free ? "，可点击" : "，当前被压住"}`;
          button.innerHTML = `
            <span class="tile-inner">
              <span class="tile-glyph">${tile.glyph}</span>
              <span class="tile-name">${tile.name}</span>
            </span>
          `;
          button.addEventListener("click", () => handleTileClick(tile.id));
          boardEl.appendChild(button);
        }

        remainingCountEl.textContent = String(getRemainingTiles().length);
        matchCountEl.textContent = String(state.matchCount);
      }

      function clearHints() {
        state.tiles.forEach((tile) => {
          tile.hint = false;
        });
      }

      function createBoard() {
        const tiles = shuffle(baseDeck).map((tile, index) => ({
          ...tile,
          slot: index,
          removed: false,
          removing: false,
          hint: false,
        }));

        state = {
          tiles,
          selectedId: null,
          matchCount: 0,
          locked: false,
        };

        updateStatus("看看哪两张先有缘分。");
        renderBoard();
      }

      function reshuffleRemaining() {
        if (state.locked) {
          return;
        }

        const remaining = shuffle(getRemainingTiles());
        const slots = remaining.map((tile) => tile.slot).sort((a, b) => a - b);

        remaining.forEach((tile, index) => {
          tile.slot = slots[index];
        });

        state.selectedId = null;
        clearHints();
        updateStatus("已重新洗牌，继续摸牌。");
        renderBoard();
      }

      function markHint() {
        if (state.locked) {
          return;
        }

        clearHints();
        const pairs = getFreeMatchingPairs();

        if (pairs.length === 0) {
          updateStatus("当前没有可消对子了，试试重新洗牌。");
          renderBoard();
          return;
        }

        const [first, second] = pairs[Math.floor(Math.random() * pairs.length)];
        first.hint = true;
        second.hint = true;
        updateStatus(`提示：试试 ${first.name} 这一对。`);
        renderBoard();
      }

      function finishMatch(first, second) {
        state.locked = true;
        first.removing = true;
        second.removing = true;
        renderBoard();

        window.setTimeout(() => {
          first.removed = true;
          second.removed = true;
          first.removing = false;
          second.removing = false;
          state.selectedId = null;
          state.matchCount += 1;
          state.locked = false;
          clearHints();

          const remaining = getRemainingTiles().length;
          if (remaining === 0) {
            updateStatus("清台成功，今天的摸鱼战绩很体面。", true);
          } else if (getFreeMatchingPairs().length === 0) {
            updateStatus("场上暂时没对子了，洗一洗继续。");
          } else {
            updateStatus(`消掉一对 ${first.name}，继续找下一组。`);
          }

          renderBoard();
        }, 180);
      }

      function handleTileClick(tileId) {
        if (state.locked) {
          return;
        }

        clearHints();
        const tile = getTileById(tileId);

        if (!isTileFree(tile)) {
          state.selectedId = null;
          updateStatus("这张牌两边都被卡住了，先找外露的。");
          renderBoard();
          return;
        }

        if (state.selectedId === tileId) {
          state.selectedId = null;
          updateStatus("已取消选择。");
          renderBoard();
          return;
        }

        if (!state.selectedId) {
          state.selectedId = tileId;
          updateStatus(`已选中 ${tile.name}，再找一张同样的。`);
          renderBoard();
          return;
        }

        const selectedTile = getTileById(state.selectedId);
        if (!selectedTile || selectedTile.removed) {
          state.selectedId = null;
          renderBoard();
          return;
        }

        if (selectedTile.key !== tile.key) {
          state.selectedId = tileId;
          updateStatus("牌型不同，已经帮你切换到新选择。");
          renderBoard();
          return;
        }

        finishMatch(selectedTile, tile);
      }

      restartButton.addEventListener("click", createBoard);
      shuffleButton.addEventListener("click", reshuffleRemaining);
      hintButton.addEventListener("click", markHint);

      createBoard();
    </script>
  </body>
</html>
