<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小游戏列表</title>
    <style>
      :root {
        --bg: #f5efe3;
        --panel: rgba(255, 250, 243, 0.84);
        --ink: #1e2a39;
        --muted: #667487;
        --line: rgba(30, 42, 57, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(255, 177, 116, 0.3), transparent 28%),
          radial-gradient(circle at right center, rgba(133, 217, 206, 0.22), transparent 24%),
          linear-gradient(180deg, #fff8ef 0%, var(--bg) 100%);
      }

      main {
        width: min(980px, calc(100% - 24px));
        margin: 0 auto;
        padding: 40px 0 60px;
      }

      .hero,
      .panel {
        padding: 24px;
        border-radius: 28px;
        border: 1px solid var(--line);
        background: var(--panel);
        backdrop-filter: blur(12px);
        box-shadow: 0 24px 50px rgba(58, 43, 26, 0.1);
      }

      .hero {
        margin-bottom: 18px;
      }

      .eyebrow {
        margin: 0 0 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        font-size: 12px;
        font-weight: 800;
        color: #db6a4f;
      }

      h1,
      h2 {
        margin: 0;
      }

      .intro {
        margin: 16px 0 0;
        max-width: 56ch;
        line-height: 1.8;
        color: var(--muted);
      }

      .list {
        display: grid;
        gap: 14px;
        margin-top: 18px;
      }

      .card {
        display: block;
        padding: 22px;
        border-radius: 22px;
        color: inherit;
        text-decoration: none;
        background: linear-gradient(135deg, rgba(255, 214, 153, 0.72), rgba(255, 244, 225, 0.92));
        border: 1px solid rgba(30, 42, 57, 0.08);
        transition: transform 160ms ease, box-shadow 160ms ease;
      }

      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 18px 28px rgba(58, 43, 26, 0.12);
      }

      .card strong {
        display: block;
        font-size: 1.2rem;
      }

      .card p {
        margin: 12px 0 0;
        line-height: 1.7;
        color: var(--muted);
      }

      .back {
        display: inline-block;
        margin-top: 18px;
        color: #40536d;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <p class="eyebrow">MOYU GAMES</p>
        <h1>小游戏列表</h1>
        <p class="intro">这里放一些适合轻松打开、顺手玩两下的前端小玩具和交互实验。</p>
      </section>

      <section class="panel">
        <h2>当前可玩</h2>
        <div class="list">
          <a class="card" href="./stick-tower-hero/">
            <strong>火柴人爬塔英雄</strong>
            <p>在 9:16 竖屏塔楼里一路选路爬塔，吞掉更弱的守卫、拿钥匙开门、规避陷阱，最后挑战顶层 Boss。</p>
          </a>

          <a class="card" href="./mahjong-match.html">
            <strong>麻将消消乐</strong>
            <p>挑出左右至少一侧空着的同花色麻将牌，两两配对消除，适合安静摸一局。</p>
          </a>

          <a class="card" href="./sand-paint.html">
            <strong>彩砂流动画板</strong>
            <p>鼠标点击或拖动会喷出彩色线条和粒子，粒子会在重力作用下落到底部并逐渐堆积成沙丘。</p>
          </a>
        </div>

        <a class="back" href="../index.html">返回首页</a>
      </section>
    </main>
  </body>
</html>
