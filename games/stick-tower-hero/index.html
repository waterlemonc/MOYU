<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>火柴人爬塔英雄 | MOYU</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-glow" aria-hidden="true"></div>

    <main class="app">
      <header class="hero">
        <div>
          <p class="eyebrow">MOYU TOWER</p>
          <h1>火柴人爬塔英雄</h1>
          <p class="hero-copy">
            选择相邻房间一路爬塔，吞掉更弱的敌人、攒战力、拿钥匙、躲陷阱，最后把顶层 Boss
            一脚踹下去。
          </p>
        </div>

        <div class="hero-actions">
          <a class="nav-link nav-link-soft" href="../index.html">返回小游戏仓</a>
          <a class="nav-link" href="../../index.html">返回摸鱼指挥部</a>
        </div>
      </header>

      <section class="hud" aria-label="游戏状态">
        <article class="hud-card">
          <span>当前关卡</span>
          <strong id="level-name">--</strong>
          <small id="level-index-label">第 -- / -- 关</small>
        </article>
        <article class="hud-card">
          <span>当前战力</span>
          <strong id="power-value">0</strong>
          <small>必须严格大于目标战力</small>
        </article>
        <article class="hud-card">
          <span>钥匙数量</span>
          <strong id="key-value">0</strong>
          <small>锁门会消耗 1 把钥匙</small>
        </article>
        <article class="hud-card">
          <span>当前分数</span>
          <strong id="score-value">0</strong>
          <small>战力越高，分数越高</small>
        </article>
        <article class="hud-card">
          <span>本局用时</span>
          <strong id="time-value">00:00</strong>
          <small>通关后会记录最佳时间</small>
        </article>
        <article class="hud-card">
          <span>最佳记录</span>
          <strong id="best-value">未通关</strong>
          <small id="unlock-value">已解锁 1 / 5 关</small>
        </article>
      </section>

      <section class="game-shell">
        <div class="canvas-frame">
          <canvas id="game-canvas" width="432" height="768" aria-label="火柴人爬塔游戏画布"></canvas>
          <div class="canvas-overlay" aria-hidden="true">
            <div class="corner-note">点击相邻房间开始爬塔</div>
          </div>
        </div>

        <div class="status-bar" aria-live="polite">
          <p class="status-title">指挥提示</p>
          <p id="status-message">正在读取塔楼布局……</p>
        </div>
      </section>

      <section class="controls" aria-label="关卡操作">
        <button class="control-button secondary" id="prev-level" type="button">上一关</button>
        <button class="control-button secondary" id="restart-level" type="button">重新开始</button>
        <button class="control-button secondary" id="hint-level" type="button">提示路线</button>
        <button class="control-button primary" id="next-level" type="button">下一关</button>
      </section>
    </main>

    <div class="modal hidden" id="result-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-card">
        <p class="eyebrow">MOYU REPORT</p>
        <h2 id="modal-title">战报</h2>
        <p class="modal-copy" id="modal-text"></p>

        <div class="modal-stats">
          <div>
            <span>本局用时</span>
            <strong id="modal-time">00:00</strong>
          </div>
          <div>
            <span>本局分数</span>
            <strong id="modal-score">0</strong>
          </div>
          <div>
            <span>最佳成绩</span>
            <strong id="modal-best">未通关</strong>
          </div>
        </div>

        <div class="modal-actions">
          <button class="modal-button secondary" id="modal-secondary" type="button">再来一次</button>
          <button class="modal-button primary" id="modal-primary" type="button">下一关</button>
        </div>
      </div>
    </div>

    <script src="levels.js"></script>
    <script src="main.js"></script>
  </body>
</html>
