<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOYU</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">MOYU LAB</p>
        <h1>摸鱼静态页与小游戏展示站</h1>

          这里可以持续收纳一些轻松的小页面、实验性质的交互作品，或者随手做的小游戏。
        </p>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>内容入口</h2>
          <span>持续更新</span>

        <div class="grid">
          <a class="card soon" href="./pages/">
            <strong>静态页面</strong>
            <p>把专题页、整活页、单文件 demo 放在这里。</p>
          </a>

          <a class="card soon" href="./games/">
            <strong>小游戏</strong>
            <p>适合收纳 canvas、DOM 或纯前端小游戏。</p>
          </a>
